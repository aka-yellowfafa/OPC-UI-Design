<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>服务器频道浏览</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background: #1a202c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .phone-frame {
      width: 402px;
      height: 874px;
      background: #F5EFE2;
      position: relative;
      overflow: hidden;
      border-radius: 48px;
      border: 10px solid #f0ece6;
      box-shadow: 0 25px 80px rgba(0,0,0,0.35);
      display: flex;
    }

    /* 左侧服务器导航栏 */
    .server-sidebar {
      width: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 100px;
      gap: 12px;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }
    .server-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 500;
      position: relative;
      cursor: pointer;
      transition: all 0.2s;
    }
    .server-icon:active {
      transform: scale(0.95);
    }
    .server-icon.active {
      background: #2D2D2D;
      color: #fff;
    }
    .server-icon.normal {
      background: rgba(255,255,255,0.8);
      color: #2D2D2D;
      border: 1px solid rgba(0,0,0,0.06);
    }
    .server-icon .dot {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #D4875A;
      border: 2px solid #F5EFE2;
    }

    /* 右侧主内容 */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 搜索栏 */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 12px;
      margin-top: 72px;
    }
    .search-input {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.8);
      border-radius: 24px;
      padding: 8px 14px;
      border: 1px solid rgba(0,0,0,0.04);
    }
    .search-input input {
      border: none;
      outline: none;
      background: transparent;
      font-size: 13px;
      color: #2D2D2D;
      width: 100%;
    }
    .search-input input::placeholder {
      color: rgba(0,0,0,0.35);
    }
    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(0,0,0,0.04);
      cursor: pointer;
      flex-shrink: 0;
    }
    .icon-btn:active {
      background: rgba(255,255,255,1);
      transform: scale(0.95);
    }

    /* 频道列表 */
    .channel-content {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 100px 0;
    }
    .channel-content::-webkit-scrollbar { display: none; }

    .server-info {
      padding: 8px 0 16px 0;
    }
    .server-name {
      font-size: 22px;
      font-weight: 600;
      color: #2D2D2D;
      margin-bottom: 6px;
    }
    .server-meta {
      font-size: 12px;
      color: rgba(0,0,0,0.4);
      line-height: 1.6;
    }

    .section-title {
      font-size: 12px;
      font-weight: 500;
      color: rgba(0,0,0,0.5);
      margin: 12px 0 8px 0;
      padding-left: 4px;
    }

    .channel-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.7);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(0,0,0,0.03);
    }
    .channel-card:active {
      background: rgba(255,255,255,1);
      transform: scale(0.98);
    }
    .channel-card-text {
      font-size: 13px;
      color: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .category-group {
      margin-bottom: 4px;
    }
    .category-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #2D2D2D;
    }
    .category-header svg {
      transition: transform 0.2s;
    }
    .category-header.collapsed svg {
      transform: rotate(-90deg);
    }

    .channel-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 4px;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 8px;
      margin-left: 16px;
    }
    .channel-item:hover {
      background: rgba(255,255,255,0.5);
    }

    .category-content {
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .category-content.collapsed {
      max-height: 0;
    }
    .channel-item span {
      font-size: 13px;
      color: rgba(0,0,0,0.6);
    }
    .channel-item .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #D4875A;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* 底部 Tab Bar - 浅色 */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: rgba(245, 239, 226, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 6px;
      border-top: 1px solid rgba(0,0,0,0.04);
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding-top: 6px;
      cursor: pointer;
      flex: 1;
      min-width: 50px;
    }
    .tab-item.center {
      position: relative;
      top: -18px;
      flex: 1;
    }
    .tab-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tab-icon svg {
      width: 22px;
      height: 22px;
      stroke: #999;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .tab-item.active .tab-icon svg {
      stroke: #2D2D2D;
      fill: #2D2D2D;
    }
    .tab-label {
      font-size: 10px;
      color: #999;
    }
    .tab-item.active .tab-label {
      color: #2D2D2D;
      font-weight: 500;
    }
    .publish-btn {
      width: 50px;
      height: 50px;
      background: #2D2D2D;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid #F5EFE2;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      position: relative;
    }
    .publish-btn::before,
    .publish-btn::after {
      content: '';
      position: absolute;
      background: #fff;
      border-radius: 1px;
    }
    .publish-btn::before {
      width: 18px;
      height: 2.5px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .publish-btn::after {
      width: 2.5px;
      height: 18px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>

  <div class="phone-frame">
    <!-- 左侧服务器导航栏 -->
    <div class="server-sidebar">
      <div class="server-icon normal">
        私
      </div>
      <div class="server-icon active">
        官
        <span class="dot"></span>
      </div>
      <div class="server-icon normal">
        会
      </div>
      <div class="server-icon normal">
        战
        <span class="dot"></span>
      </div>
    </div>

    <!-- 右侧主内容 -->
    <div class="main-area">
      <!-- Status Bar -->
      <div class="absolute top-0 left-0 right-0 flex items-center justify-between px-7 pt-4 pb-2" style="left: 52px;">
        <span class="text-sm font-semibold" style="color: #2D2D2D;">9:41</span>
        <div class="flex items-center gap-1">
          <div class="w-6 h-3 border rounded-sm relative" style="border-color: #2D2D2D;">
            <div class="absolute inset-0.5 rounded-sm" style="background: #2D2D2D;"></div>
          </div>
        </div>
      </div>

      <!-- Search Bar -->
      <div class="search-bar">
        <div class="search-input">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: rgba(0,0,0,0.3);">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input type="text" placeholder="搜索频道、成员、文件">
        </div>
        <button class="icon-btn">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: #666;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
          </svg>
        </button>
        <button class="icon-btn">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: #666;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </button>
      </div>

      <!-- Channel Content -->
      <div class="channel-content">
        <!-- Server Info -->
        <div class="server-info">
          <h1 class="server-name">培风社官方</h1>
          <p class="server-meta">2,406 位成员 · 社区<br>订阅中 · 2 个未读频道</p>
        </div>

        <!-- Browse Channels -->
        <p class="section-title">浏览频道</p>
        <div class="channel-card">
          <svg class="w-4 h-4" fill="none" stroke="#D4875A" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/>
          </svg>
          <span class="text-sm font-medium" style="color: #2D2D2D;">公告</span>
          <div class="dot" style="margin-left: auto;"></div>
        </div>
        <div class="channel-card-text" style="padding: 8px 14px;">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: rgba(0,0,0,0.4);">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span>welcome-and-rules</span>
        </div>

        <!-- Welcome Category -->
        <div class="category-group">
          <div class="category-header" onclick="toggleCategory(this)">
            <svg class="w-3.5 h-3.5 transition-transform duration-200" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="color: #2D2D2D;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
            Welcome
          </div>
          <div class="category-content">
            <div class="channel-item">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: rgba(0,0,0,0.4);">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/>
              </svg>
              <span>活动直播间</span>
            </div>
            <div class="channel-item">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: rgba(0,0,0,0.4);">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <span>休息室</span>
            </div>
          </div>
        </div>

        <!-- Discuss Category -->
        <div class="category-group">
          <div class="category-header" onclick="toggleCategory(this)">
            <svg class="w-3.5 h-3.5 transition-transform duration-200" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="color: #2D2D2D;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
            Discuss
          </div>
          <div class="category-content">
            <div class="channel-item">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: rgba(0,0,0,0.4);">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"/>
              </svg>
              <span>项目群聊</span>
            </div>
            <div class="channel-item">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: rgba(0,0,0,0.4);">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
              </svg>
              <span>任务协作</span>
              <div class="dot"></div>
            </div>
            <div class="channel-item">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: rgba(0,0,0,0.4);">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z"/>
              </svg>
              <span>资源交换</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 底部 Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
        </div>
        <div class="tab-label">发现</div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <div class="tab-label">任务</div>
      </div>
      <div class="tab-item center">
        <div class="publish-btn"></div>
      </div>
      <div class="tab-item active">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="tab-label">信息</div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="tab-label">我的</div>
      </div>
    </div>

    <!-- Home Indicator -->
    <div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-28 h-1 rounded-full" style="background: rgba(0,0,0,0.15);"></div>
  </div>

  <script>
    function toggleCategory(header) {
      const content = header.nextElementSibling;
      const arrow = header.querySelector('svg');
      if (content.style.maxHeight === '0px') {
        content.style.maxHeight = content.scrollHeight + 'px';
        arrow.style.transform = 'rotate(0deg)';
      } else {
        content.style.maxHeight = '0px';
        arrow.style.transform = 'rotate(-90deg)';
      }
    }
    // 初始化展开状态
    document.querySelectorAll('.category-content').forEach(content => {
      content.style.maxHeight = content.scrollHeight + 'px';
      content.style.overflow = 'hidden';
      content.style.transition = 'max-height 0.3s ease';
    });
  </script>

</body>
</html>
