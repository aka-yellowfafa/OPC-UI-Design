<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>发送响应</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background: #1a202c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .phone-frame {
      width: 402px;
      height: 874px;
      background: #1a1a1a;
      position: relative;
      overflow-x: hidden;
      border-radius: 48px;
      border: 10px solid #2a2a2a;
      box-shadow: 0 25px 80px rgba(0,0,0,0.35);
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 底部 Tab Bar - 深色版本 */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: rgba(30, 30, 30, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 6px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding-top: 6px;
      cursor: pointer;
      flex: 1;
      min-width: 50px;
    }

    .tab-item.center {
      position: relative;
      top: -18px;
      flex: 1;
    }

    .tab-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tab-icon svg {
      width: 22px;
      height: 22px;
      stroke: #888;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tab-item.active .tab-icon svg {
      stroke: #fff;
      fill: #fff;
    }

    .tab-label {
      font-size: 10px;
      color: #888;
    }

    .tab-item.active .tab-label {
      color: #fff;
      font-weight: 500;
    }

    .publish-btn {
      width: 50px;
      height: 50px;
      background: #1a1a1a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid #888;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      position: relative;
    }

    .publish-btn::before,
    .publish-btn::after {
      content: '';
      position: absolute;
      background: #fff;
      border-radius: 1px;
    }

    .publish-btn::before {
      width: 18px;
      height: 2.5px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .publish-btn::after {
      width: 2.5px;
      height: 18px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>

  <div class="phone-frame">
    <!-- Status Bar -->
    <div class="flex items-center justify-between px-7 pt-4 pb-2">
      <span class="text-sm font-semibold text-white">9:41</span>
      <div class="flex items-center gap-1">
        <div class="w-6 h-3 border border-white/60 rounded-sm relative">
          <div class="absolute inset-0.5 bg-white rounded-sm"></div>
        </div>
      </div>
    </div>

    <!-- Header -->
    <div class="flex items-center justify-between px-5 pt-2 pb-4">
      <button class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <button class="flex items-center gap-1 text-sm" style="color: #D4875A;">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
        快速响应
      </button>
    </div>

    <!-- Content -->
    <div class="px-5 pb-32 overflow-y-auto hide-scrollbar" style="max-height: calc(100% - 160px);">
      <!-- Subtitle & Title -->
      <div class="mb-6">
        <p class="text-xs mb-1" style="color: #888;">给 林一舟</p>
        <h1 class="text-2xl font-bold text-white leading-tight">
          先把合作意向说清楚
        </h1>
      </div>

      <!-- Response Template -->
      <div class="rounded-2xl p-4 mb-4" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
        <p class="text-xs mb-3" style="color: #888;">响应模板</p>
        <div class="space-y-2">
          <!-- Selected -->
          <button class="w-full flex items-center gap-3 px-4 py-3 rounded-full text-sm font-medium" style="background: #f5f0eb; color: #1a1a1a;">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
            </svg>
            <span class="flex-1 text-left">我能接这个需求</span>
            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          </button>
          <!-- Unselected 1 -->
          <button class="w-full flex items-center gap-3 px-4 py-3 rounded-full text-sm" style="background: rgba(255,255,255,0.05); color: #bbb; border: 1px solid rgba(255,255,255,0.1);">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <span class="flex-1 text-left">我有档期，想约 15 分钟聊</span>
          </button>
          <!-- Unselected 2 -->
          <button class="w-full flex items-center gap-3 px-4 py-3 rounded-full text-sm" style="background: rgba(255,255,255,0.05); color: #bbb; border: 1px solid rgba(255,255,255,0.1);">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span class="flex-1 text-left">我需要先确认几个问题</span>
          </button>
        </div>
      </div>

      <!-- Your Supplement -->
      <div class="rounded-2xl p-4 mb-4" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
        <p class="text-xs mb-3" style="color: #888;">你的补充</p>
        <textarea class="w-full bg-transparent text-white text-sm resize-none outline-none" style="color: #bbb;" rows="4" placeholder="写一段简短的自我介绍与可交付时间..."></textarea>
        <div class="flex items-center justify-between mt-2">
          <span class="text-xs" style="color: #666;">建议 60-120 字</span>
          <span class="text-xs" style="color: #666;">47 / 200</span>
        </div>
      </div>

      <!-- Tags -->
      <div class="flex items-center gap-2 mb-6">
        <button class="flex items-center gap-1.5 px-3 py-2 rounded-full text-xs" style="background: rgba(255,255,255,0.05); color: #bbb; border: 1px solid rgba(255,255,255,0.1);">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
          </svg>
          附案例
        </button>
        <button class="flex items-center gap-1.5 px-3 py-2 rounded-full text-xs" style="background: rgba(255,255,255,0.05); color: #bbb; border: 1px solid rgba(255,255,255,0.1);">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
          </svg>
          语音说明
        </button>
        <button class="flex items-center gap-1.5 px-3 py-2 rounded-full text-xs" style="background: rgba(255,255,255,0.05); color: #bbb; border: 1px solid rgba(255,255,255,0.1);">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          报价范围
        </button>
      </div>

      <!-- Send Button -->
      <div class="flex justify-end">
        <button class="flex items-center gap-2 px-6 py-3 rounded-full text-sm font-medium shadow-lg" style="background: #f5f0eb; color: #1a1a1a;">
          发送响应
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24" style="color: #D4875A;">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 底部 Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item active">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
        </div>
        <div class="tab-label">发现</div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <div class="tab-label">任务</div>
      </div>
      <div class="tab-item center">
        <div class="publish-btn"></div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="tab-label">信息</div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="tab-label">我的</div>
      </div>
    </div>

    <!-- Home Indicator -->
    <div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-28 h-1 rounded-full" style="background: rgba(255,255,255,0.2);"></div>
  </div>

</body>
</html>
