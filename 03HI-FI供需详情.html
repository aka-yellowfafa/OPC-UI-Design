<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>供需详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#F5F0EB',
            'cream-dark': '#EDE8E1',
            brown: '#2D2D2D',
            'brown-light': '#5A5A5A',
            'brown-muted': '#9A8E82',
            'tag-bg': '#2D2D2D',
            'tag-text': '#FFFFFF',
            'badge-bg': '#FFFFFF',
            'card-bg': '#FFFFFF',
            'divider': '#E8E3DD',
            'orange-accent': '#D4875A',
          },
          fontFamily: {
            sans: ['Noto Sans SC', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'soft': '0 2px 16px rgba(61, 50, 41, 0.06)',
            'float': '0 4px 24px rgba(61, 50, 41, 0.10)',
            'btn': '0 4px 16px rgba(61, 50, 41, 0.15)',
          },
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background: #1a202c;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .phone-frame {
      width: 402px;
      height: 874px;
      background: #F5F0EB;
      position: relative;
      overflow-x: hidden;
      border-radius: 48px;
      border: 10px solid #f0ece6;
      box-shadow: 0 25px 80px rgba(0,0,0,0.35);
    }
    .audio-wave {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 24px;
    }
    .audio-wave span {
      width: 3px;
      background: #B5A99D;
      border-radius: 2px;
      animation: wave 1.2s ease-in-out infinite;
    }
    .audio-wave span:nth-child(1) { height: 8px; animation-delay: 0s; }
    .audio-wave span:nth-child(2) { height: 16px; animation-delay: 0.1s; }
    .audio-wave span:nth-child(3) { height: 12px; animation-delay: 0.2s; }
    .audio-wave span:nth-child(4) { height: 20px; animation-delay: 0.3s; }
    .audio-wave span:nth-child(5) { height: 10px; animation-delay: 0.4s; }
    .audio-wave span:nth-child(6) { height: 18px; animation-delay: 0.5s; }
    .audio-wave span:nth-child(7) { height: 14px; animation-delay: 0.6s; }
    .audio-wave span:nth-child(8) { height: 22px; animation-delay: 0.7s; }
    .audio-wave span:nth-child(9) { height: 10px; animation-delay: 0.8s; }
    .audio-wave span:nth-child(10) { height: 16px; animation-delay: 0.9s; }
    .audio-wave span:nth-child(11) { height: 12px; animation-delay: 1.0s; }
    .audio-wave span:nth-child(12) { height: 20px; animation-delay: 1.1s; }
    @keyframes wave {
      0%, 100% { transform: scaleY(0.5); opacity: 0.5; }
      50% { transform: scaleY(1); opacity: 1; }
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .star-icon {
      color: #D4875A;
    }
    .nav-item-active {
      color: #2D2D2D;
    }
    .nav-item-inactive {
      color: #9A8E82;
    }

    /* 底部 Tab Bar */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: #F5EFE2;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 6px;
      border-top: 1px solid rgba(0,0,0,0.04);
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding-top: 6px;
      cursor: pointer;
      flex: 1;
      min-width: 50px;
    }

    .tab-item.center {
      position: relative;
      top: -18px;
      flex: 1;
    }

    .tab-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tab-icon svg {
      width: 22px;
      height: 22px;
      stroke: #bbb;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tab-item.active .tab-icon svg {
      stroke: #1a1a1a;
      fill: #1a1a1a;
    }

    .tab-label {
      font-size: 10px;
      color: #bbb;
    }

    .tab-item.active .tab-label {
      color: #1a1a1a;
      font-weight: 500;
    }

    .publish-btn {
      width: 50px;
      height: 50px;
      background: #1a1a1a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid #F5F0EB;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      position: relative;
    }

    .publish-btn::before,
    .publish-btn::after {
      content: '';
      position: absolute;
      background: #fff;
      border-radius: 1px;
    }

    .publish-btn::before {
      width: 18px;
      height: 2.5px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .publish-btn::after {
      width: 2.5px;
      height: 18px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>

  <div class="phone-frame">
    <!-- Status Bar -->
    <div class="flex items-center justify-between px-7 pt-4 pb-2">
      <span class="text-sm font-semibold text-brown">9:41</span>
      <div class="flex items-center gap-1">
        <div class="w-6 h-3 border border-brown rounded-sm relative">
          <div class="absolute inset-0.5 bg-brown rounded-sm"></div>
        </div>
      </div>
    </div>

    <!-- Header -->
    <div class="flex items-center justify-between px-5 pt-2 pb-4">
      <button class="w-10 h-10 rounded-full bg-white shadow-soft flex items-center justify-center">
        <svg class="w-5 h-5 text-brown" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="flex items-center gap-3">
        <button class="w-10 h-10 rounded-full bg-white shadow-soft flex items-center justify-center">
          <svg class="w-5 h-5 text-brown" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
          </svg>
        </button>
        <button class="w-10 h-10 rounded-full bg-white shadow-soft flex items-center justify-center">
          <svg class="w-5 h-5 text-brown" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Scrollable Content -->
    <div class="px-5 pb-36 overflow-y-auto hide-scrollbar" style="max-height: calc(100vh - 180px);">
      <!-- Tags -->
      <div class="flex items-center gap-2.5 mb-4">
        <span class="px-4 py-1.5 rounded-full bg-tag-bg text-tag-text text-xs font-medium">悬赏</span>
        <span class="px-4 py-1.5 rounded-full bg-white text-brown text-xs font-medium shadow-sm">设计</span>
        <span class="px-4 py-1.5 rounded-full bg-white text-brown text-xs font-medium shadow-sm">待响应</span>
      </div>

      <!-- Title -->
      <h1 class="text-2xl font-bold text-brown leading-tight mb-3">
        AI 工具官网首屏与介绍页设计
      </h1>

      <!-- Description -->
      <p class="text-sm text-brown-muted leading-relaxed mb-6">
        本周完成一版可演示页面。需要懂 SaaS 叙事和 AI 产品卖点表达，可远程协作。
      </p>

      <!-- Info Cards Grid -->
      <div class="grid grid-cols-2 gap-3 mb-4">
        <div class="bg-card-bg rounded-2xl p-4 shadow-soft">
          <p class="text-xs text-brown-muted mb-1">预算</p>
          <p class="text-lg font-semibold text-brown">3k-5k</p>
        </div>
        <div class="bg-card-bg rounded-2xl p-4 shadow-soft">
          <p class="text-xs text-brown-muted mb-1">截止</p>
          <p class="text-lg font-semibold text-brown">5 月 24 日</p>
        </div>
        <div class="bg-card-bg rounded-2xl p-4 shadow-soft">
          <p class="text-xs text-brown-muted mb-1">合作</p>
          <p class="text-lg font-semibold text-brown">远程</p>
        </div>
        <div class="bg-card-bg rounded-2xl p-4 shadow-soft">
          <p class="text-xs text-brown-muted mb-1">响应</p>
          <p class="text-lg font-semibold text-brown">4 人</p>
        </div>
      </div>

      <!-- Publisher Card -->
      <div class="bg-card-bg rounded-2xl p-4 shadow-soft mb-4">
        <p class="text-xs text-brown-muted mb-3">发布者</p>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-full bg-brown flex items-center justify-center">
              <span class="text-white text-base font-medium">林</span>
            </div>
            <div>
              <div class="flex items-center gap-1.5">
                <span class="text-sm font-semibold text-brown">林一舟</span>
                <span class="text-sm text-brown-muted">·</span>
                <span class="text-sm text-brown-muted">认证 OPC</span>
              </div>
              <p class="text-xs text-brown-muted mt-0.5">入驻 126 天 · 近 7 日活跃 · 3 次有效合作</p>
            </div>
          </div>
          <svg class="w-4 h-4 text-brown-muted" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
        </div>
      </div>

      <!-- Audio Card -->
      <div class="bg-card-bg rounded-2xl p-4 shadow-soft mb-4">
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs text-brown-muted">原始语音</span>
          <span class="text-xs text-brown-muted">00:52</span>
        </div>
        <div class="flex items-center gap-3">
          <button class="w-11 h-11 rounded-full bg-brown flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-white ml-0.5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </button>
          <div class="audio-wave flex-1">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span>
          </div>
        </div>
      </div>

      <!-- AI Match Tip -->
      <div class="mb-4">
        <div class="flex items-center gap-1.5 mb-2">
          <svg class="w-4 h-4 star-icon" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
          <span class="text-sm font-semibold text-brown">AI 匹配提示</span>
        </div>
        <p class="text-sm text-brown-muted leading-relaxed">
          你的档案中包含 SaaS、落地页、产品视觉标签，匹配度 <span class="text-orange-accent font-semibold">88%</span>。建议响应时补充近期案例和可交付时间。
        </p>
      </div>
    </div>

    <!-- Bottom Action Buttons -->
    <div class="absolute bottom-28 left-0 right-0 px-5">
      <div class="flex items-center gap-3">
        <button class="flex-1 h-12 rounded-full bg-white shadow-btn flex items-center justify-center gap-2 text-sm font-medium text-brown border border-cream-dark">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          提问
        </button>
        <button class="flex-[2] h-12 rounded-full bg-brown shadow-btn flex items-center justify-center gap-2 text-sm font-medium text-white">
          我想响应
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 底部 Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item active">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
        </div>
        <div class="tab-label">发现</div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <div class="tab-label">任务</div>
      </div>
      <div class="tab-item center">
        <div class="publish-btn"></div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="tab-label">信息</div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="tab-label">我的</div>
      </div>
    </div>

    <!-- Home Indicator -->
    <div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-28 h-1 bg-brown/20 rounded-full"></div>
  </div>

  <script>
    // Tab 切换
    document.querySelectorAll('.tab-item:not(.center)').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>
</body>
</html>
