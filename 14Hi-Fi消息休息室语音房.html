<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>休息室 - 语音房</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background: #1a202c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .phone-frame {
      width: 402px;
      height: 874px;
      background: #F5EFE2;
      position: relative;
      overflow: hidden;
      border-radius: 48px;
      border: 10px solid #f0ece6;
      box-shadow: 0 25px 80px rgba(0,0,0,0.35);
      display: flex;
      flex-direction: column;
    }

    /* 底部 Tab Bar - 浅色 */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: rgba(245, 239, 226, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 6px;
      border-top: 1px solid rgba(0,0,0,0.04);
      z-index: 10;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding-top: 6px;
      cursor: pointer;
      flex: 1;
      min-width: 50px;
    }
    .tab-item.center {
      position: relative;
      top: -18px;
      flex: 1;
    }
    .tab-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tab-icon svg {
      width: 22px;
      height: 22px;
      stroke: #999;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .tab-item.active .tab-icon svg {
      stroke: #2D2D2D;
      fill: #2D2D2D;
    }
    .tab-label {
      font-size: 10px;
      color: #999;
    }
    .tab-item.active .tab-label {
      color: #2D2D2D;
      font-weight: 500;
    }
    .publish-btn {
      width: 50px;
      height: 50px;
      background: #2D2D2D;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid #F5EFE2;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      position: relative;
    }
    .publish-btn::before,
    .publish-btn::after {
      content: '';
      position: absolute;
      background: #fff;
      border-radius: 1px;
    }
    .publish-btn::before {
      width: 18px;
      height: 2.5px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .publish-btn::after {
      width: 2.5px;
      height: 18px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* 语音房主卡片 */
    .voice-card {
      width: 200px;
      height: 240px;
      background: rgba(255,255,255,0.9);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      margin: 0 auto;
    }
    .avatar-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #2D2D2D;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 32px;
      font-weight: 500;
    }
    .name-bar {
      width: 80px;
      height: 14px;
      border-radius: 8px;
      background: #2D2D2D;
    }

    /* 添加成员 */
    .add-member {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 40px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-member:active {
      opacity: 0.7;
    }

    /* 底部操作栏 */
    .action-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 20px;
      background: rgba(45, 45, 45, 0.95);
      border-radius: 32px;
      margin: 0 auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .action-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .action-btn.dark {
      background: rgba(255,255,255,0.1);
    }
    .action-btn.light {
      background: #fff;
    }
    .action-btn.red {
      background: #E05A4E;
    }
    .action-btn:active {
      transform: scale(0.92);
    }
  </style>
</head>
<body>

  <div class="phone-frame">
    <!-- Status Bar -->
    <div class="flex items-center justify-between px-7 pt-4 pb-2 flex-shrink-0">
      <span class="text-sm font-semibold" style="color: #2D2D2D;">9:41</span>
      <div class="flex items-center gap-1">
        <div class="w-6 h-3 border rounded-sm relative" style="border-color: #2D2D2D;">
          <div class="absolute inset-0.5 rounded-sm" style="background: #2D2D2D;"></div>
        </div>
      </div>
    </div>

    <!-- Header -->
    <div class="flex items-center justify-between px-5 pt-2 pb-6 flex-shrink-0">
      <div class="flex items-center gap-3">
        <button class="w-10 h-10 rounded-full flex items-center justify-center" style="background: rgba(255,255,255,0.7);">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="color: #2D2D2D;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <h1 class="text-xl font-semibold" style="color: #2D2D2D;">休息室</h1>
      </div>
      <div class="flex items-center gap-3">
        <button class="w-10 h-10 rounded-full flex items-center justify-center" style="background: rgba(255,255,255,0.7);">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: #2D2D2D;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/>
          </svg>
        </button>
        <button class="w-10 h-10 rounded-full flex items-center justify-center" style="background: rgba(255,255,255,0.7);">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: #2D2D2D;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col items-center justify-center" style="padding-bottom: 120px;">
      <!-- Voice Card -->
      <div class="voice-card mb-10">
        <div class="avatar-circle">林</div>
        <div class="name-bar"></div>
      </div>

      <!-- Add Member -->
      <div class="add-member mb-10">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: rgba(0,0,0,0.4);">
          <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
        </svg>
        <div class="flex-1">
          <p class="text-sm font-medium" style="color: #2D2D2D;">添加成员到语音聊天</p>
          <p class="text-xs" style="color: rgba(0,0,0,0.4);">让小组知道你来了</p>
        </div>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="color: rgba(0,0,0,0.25);">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </div>

      <!-- Action Bar -->
      <div class="action-bar">
        <button class="action-btn dark">
          <svg class="w-5 h-5" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
        </button>
        <button class="action-btn light">
          <svg class="w-5 h-5" fill="none" stroke="#2D2D2D" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
          </svg>
        </button>
        <button class="action-btn dark">
          <svg class="w-5 h-5" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
        </button>
        <button class="action-btn light">
          <svg class="w-5 h-5" fill="none" stroke="#2D2D2D" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/>
          </svg>
        </button>
        <button class="action-btn red">
          <svg class="w-5 h-5" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 底部 Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
        </div>
        <div class="tab-label">发现</div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <div class="tab-label">任务</div>
      </div>
      <div class="tab-item center">
        <div class="publish-btn"></div>
      </div>
      <div class="tab-item active">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="tab-label">信息</div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="tab-label">我的</div>
      </div>
    </div>

    <!-- Home Indicator -->
    <div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-28 h-1 rounded-full" style="background: rgba(0,0,0,0.15);"></div>
  </div>

</body>
</html>
