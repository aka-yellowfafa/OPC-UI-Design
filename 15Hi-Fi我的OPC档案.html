<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的档案</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background: #c8c2ba;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .phone-frame {
      width: 402px;
      height: 874px;
      background: #F5EFE2;
      position: relative;
      overflow: hidden;
      border-radius: 48px;
      border: 10px solid #c8c2ba;
      box-shadow: 0 25px 80px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
    }
    .scroll-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 90px;
    }
    .scroll-content::-webkit-scrollbar { display: none; }

    /* 底部 Tab Bar - 浅色 */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: rgba(245, 239, 226, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 6px;
      border-top: 1px solid rgba(0,0,0,0.06);
      z-index: 10;
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding-top: 6px;
      cursor: pointer;
      flex: 1;
      min-width: 50px;
    }
    .tab-item.center {
      position: relative;
      top: -18px;
      flex: 1;
    }
    .tab-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tab-icon svg {
      width: 22px;
      height: 22px;
      stroke: #777;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .tab-item.active .tab-icon svg {
      stroke: #2D2D2D;
      fill: #2D2D2D;
    }
    .tab-label {
      font-size: 10px;
      color: #777;
    }
    .tab-item.active .tab-label {
      color: #2D2D2D;
      font-weight: 500;
    }
    .publish-btn {
      width: 50px;
      height: 50px;
      background: #2D2D2D;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid #c8c2ba;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      position: relative;
    }
    .publish-btn::before,
    .publish-btn::after {
      content: '';
      position: absolute;
      background: #fff;
      border-radius: 1px;
    }
    .publish-btn::before {
      width: 18px;
      height: 2.5px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .publish-btn::after {
      width: 2.5px;
      height: 18px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* 卡片样式 */
    .card {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 12px;
    }

    /* 标签 */
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      border-radius: 16px;
      font-size: 12px;
      border: 1px solid rgba(0,0,0,0.1);
      color: rgba(0,0,0,0.6);
      cursor: pointer;
      transition: all 0.2s;
    }
    .tag:active {
      transform: scale(0.95);
    }
    .tag.dark {
      background: rgba(0,0,0,0.06);
      color: #2D2D2D;
      border-color: rgba(0,0,0,0.12);
    }
    .tag.light {
      background: transparent;
      color: rgba(0,0,0,0.4);
    }

    /* 案例卡片 */
    .case-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .case-card:active {
      background: rgba(0,0,0,0.04);
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class="phone-frame">
    <!-- Status Bar -->
    <div class="flex items-center justify-between px-7 pt-4 pb-2 flex-shrink-0">
      <span class="text-sm font-semibold" style="color: #2D2D2D;">9:41</span>
      <div class="flex items-center gap-1">
        <div class="w-6 h-3 border rounded-sm relative" style="border-color: rgba(0,0,0,0.3);">
          <div class="absolute inset-0.5 rounded-sm" style="background: #2D2D2D;"></div>
        </div>
      </div>
    </div>

    <!-- Header -->
    <div class="flex items-center justify-between px-5 pt-2 pb-2 flex-shrink-0">
      <button class="w-10 h-10 rounded-full flex items-center justify-center" style="background: rgba(0,0,0,0.06);">
        <svg class="w-5 h-5" fill="none" stroke="#2D2D2D" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <button class="w-10 h-10 rounded-full flex items-center justify-center" style="background: rgba(0,0,0,0.06);">
        <svg class="w-5 h-5" fill="none" stroke="#D4875A" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
        </svg>
      </button>
    </div>

    <!-- Scrollable Content -->
    <div class="scroll-content px-5">
      <!-- 用户信息区 -->
      <div class="flex flex-col items-center pt-4 pb-6">
        <div class="w-20 h-20 rounded-full flex items-center justify-center text-2xl font-medium text-white mb-3" style="background: #2D2D2D;">王</div>
        <h1 class="text-xl font-semibold mb-1" style="color: #2D2D2D;">王一豪</h1>
        <p class="text-sm mb-3" style="color: rgba(0,0,0,0.5);">OPC 主理人 · AI 产品 / UIUX</p>
        <div class="flex items-center gap-2">
          <span class="tag dark">
            <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="#2D2D2D" stroke-width="3" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
            已认证
          </span>
          <span class="tag light">付费会员</span>
        </div>
      </div>

      <!-- 统计卡片 -->
      <div class="flex items-center gap-3 mb-4">
        <div class="flex-1 card text-center" style="padding: 16px 10px;">
          <p class="text-xl font-semibold mb-1" style="color: #2D2D2D;">91</p>
          <p class="text-xs" style="color: rgba(0,0,0,0.5);">完整度</p>
        </div>
        <div class="flex-1 card text-center" style="padding: 16px 10px;">
          <p class="text-xl font-semibold mb-1" style="color: #2D2D2D;">6</p>
          <p class="text-xs" style="color: rgba(0,0,0,0.5);">合作</p>
        </div>
        <div class="flex-1 card text-center" style="padding: 16px 10px;">
          <p class="text-xl font-semibold mb-1" style="color: #2D2D2D;">18</p>
          <p class="text-xs" style="color: rgba(0,0,0,0.5);">响应</p>
        </div>
      </div>

      <!-- 我能提供 -->
      <div class="card">
        <p class="text-xs mb-2" style="color: rgba(0,0,0,0.35);">我能提供</p>
        <p class="text-sm leading-relaxed mb-3" style="color: rgba(0,0,0,0.75);">移动端产品设计、AI 工具原型、信息架构梳理、前台界面设计稿。</p>
        <div class="flex flex-wrap gap-2">
          <span class="tag">UIUX</span>
          <span class="tag">AI 产品</span>
          <span class="tag">移动端</span>
          <span class="tag">作品集</span>
        </div>
      </div>

      <!-- 合作偏好 -->
      <div class="card">
        <p class="text-xs mb-3" style="color: rgba(0,0,0,0.35);">合作偏好</p>
        <div class="grid grid-cols-2 gap-y-4 gap-x-4">
          <div>
            <p class="text-xs mb-1" style="color: rgba(0,0,0,0.35);">方式</p>
            <p class="text-sm" style="color: #2D2D2D;">远程 / 杭州</p>
          </div>
          <div>
            <p class="text-xs mb-1" style="color: rgba(0,0,0,0.35);">周期</p>
            <p class="text-sm" style="color: #2D2D2D;">每周 20h</p>
          </div>
          <div>
            <p class="text-xs mb-1" style="color: rgba(0,0,0,0.35);">报价</p>
            <p class="text-sm" style="color: #2D2D2D;">按项目</p>
          </div>
          <div>
            <p class="text-xs mb-1" style="color: rgba(0,0,0,0.35);">响应</p>
            <p class="text-sm" style="color: #2D2D2D;">24h 内</p>
          </div>
        </div>
      </div>

      <!-- 近期案例 -->
      <p class="text-sm font-semibold mb-3 mt-2" style="color: #2D2D2D;">近期案例</p>

      <div class="case-card">
        <div>
          <p class="text-sm font-medium mb-1" style="color: #2D2D2D;">OPC 供需平台信息架构</p>
          <p class="text-xs" style="color: rgba(0,0,0,0.4);">移动端前台 · 2026</p>
        </div>
        <svg class="w-4 h-4 flex-shrink-0 ml-3" fill="none" stroke="#D4875A" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7 17L17 7M17 7H7M17 7v10"/>
        </svg>
      </div>

      <div class="case-card">
        <div>
          <p class="text-sm font-medium mb-1" style="color: #2D2D2D;">AI 创业工具页面设计</p>
          <p class="text-xs" style="color: rgba(0,0,0,0.4);">SaaS Landing · 2026</p>
        </div>
        <svg class="w-4 h-4 flex-shrink-0 ml-3" fill="none" stroke="#D4875A" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7 17L17 7M17 7H7M17 7v10"/>
        </svg>
      </div>

      <!-- 底部留白 -->
      <div style="height: 40px;"></div>
    </div>

    <!-- 底部 Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
        </div>
        <div class="tab-label">发现</div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <div class="tab-label">任务</div>
      </div>
      <div class="tab-item center">
        <div class="publish-btn"></div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="tab-label">信息</div>
      </div>
      <div class="tab-item active">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="tab-label">我的</div>
      </div>
    </div>

    <!-- Home Indicator -->
    <div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-28 h-1 rounded-full" style="background: rgba(0,0,0,0.15);"></div>
  </div>

</body>
</html>
