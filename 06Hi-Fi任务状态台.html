<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>任务状态台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background: #1a202c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .phone-frame {
      width: 402px;
      height: 874px;
      background: #F5EFE2;
      position: relative;
      overflow-x: hidden;
      border-radius: 48px;
      border: 10px solid #f0ece6;
      box-shadow: 0 25px 80px rgba(0,0,0,0.35);
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* 底部 Tab Bar */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: #F5EFE2;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 6px;
      border-top: 1px solid rgba(0,0,0,0.04);
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding-top: 6px;
      cursor: pointer;
      flex: 1;
      min-width: 50px;
    }

    .tab-item.center {
      position: relative;
      top: -18px;
      flex: 1;
    }

    .tab-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tab-icon svg {
      width: 22px;
      height: 22px;
      stroke: #bbb;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tab-item.active .tab-icon svg {
      stroke: #1a1a1a;
      fill: #1a1a1a;
    }

    .tab-label {
      font-size: 10px;
      color: #bbb;
    }

    .tab-item.active .tab-label {
      color: #1a1a1a;
      font-weight: 500;
    }

    .publish-btn {
      width: 50px;
      height: 50px;
      background: #1a1a1a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid #F5EFE2;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      position: relative;
    }

    .publish-btn::before,
    .publish-btn::after {
      content: '';
      position: absolute;
      background: #fff;
      border-radius: 1px;
    }

    .publish-btn::before {
      width: 18px;
      height: 2.5px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .publish-btn::after {
      width: 2.5px;
      height: 18px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-chip.active {
      background: #1a1a1a;
      color: #fff;
    }
    .filter-chip.inactive {
      background: #fff;
      color: #666;
      border: 1px solid rgba(0,0,0,0.06);
    }
  </style>
</head>
<body>

  <div class="phone-frame">
    <!-- Status Bar -->
    <div class="flex items-center justify-between px-7 pt-4 pb-2">
      <span class="text-sm font-semibold" style="color: #1a1a1a;">9:41</span>
      <div class="flex items-center gap-1">
        <div class="w-6 h-3 border rounded-sm relative" style="border-color: #1a1a1a;">
          <div class="absolute inset-0.5 rounded-sm" style="background: #1a1a1a;"></div>
        </div>
      </div>
    </div>

    <!-- Header -->
    <div class="flex items-start justify-between px-5 pt-2 pb-4">
      <div>
        <p class="text-xs mb-1" style="color: #888;">任务</p>
        <h1 class="text-2xl font-bold" style="color: #1a1a1a;">状态台</h1>
      </div>
      <button class="w-10 h-10 rounded-full bg-white flex items-center justify-center" style="box-shadow: 0 2px 12px rgba(0,0,0,0.06);">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: #1a1a1a;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </button>
    </div>

    <!-- Stats Cards -->
    <div class="flex items-center gap-3 px-5 mb-5">
      <div class="flex-1 bg-white rounded-2xl py-4 px-3 text-center" style="box-shadow: 0 2px 12px rgba(0,0,0,0.04);">
        <p class="text-xl font-bold" style="color: #1a1a1a;">4</p>
        <p class="text-xs mt-1" style="color: #888;">发布中</p>
      </div>
      <div class="flex-1 bg-white rounded-2xl py-4 px-3 text-center" style="box-shadow: 0 2px 12px rgba(0,0,0,0.04);">
        <p class="text-xl font-bold" style="color: #1a1a1a;">9</p>
        <p class="text-xs mt-1" style="color: #888;">响应</p>
      </div>
      <div class="flex-1 bg-white rounded-2xl py-4 px-3 text-center" style="box-shadow: 0 2px 12px rgba(0,0,0,0.04);">
        <p class="text-xl font-bold" style="color: #1a1a1a;">2</p>
        <p class="text-xs mt-1" style="color: #888;">沟通中</p>
      </div>
    </div>

    <!-- Filter Chips -->
    <div class="flex items-center gap-2 px-5 mb-4 overflow-x-auto hide-scrollbar">
      <div class="filter-chip active">全部</div>
      <div class="filter-chip inactive">待响应</div>
      <div class="filter-chip inactive">沟通中</div>
      <div class="filter-chip inactive">已解决</div>
      <div class="filter-chip inactive">已过期</div>
    </div>

    <!-- Task Cards List -->
    <div class="px-5 pb-28 space-y-3 overflow-y-auto hide-scrollbar" style="max-height: calc(100% - 340px);">
      <!-- Card 1 -->
      <div class="bg-white rounded-2xl p-4" style="box-shadow: 0 2px 12px rgba(0,0,0,0.04);">
        <div class="flex items-center justify-between mb-2">
          <div class="flex items-center gap-2">
            <span class="px-2.5 py-0.5 rounded-full text-xs font-medium text-white" style="background: #1a1a1a;">沟通中</span>
            <span class="px-2.5 py-0.5 rounded-full text-xs font-medium" style="background: #D4875A; color: #fff;">悬赏</span>
          </div>
          <button class="p-1">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" style="color: #999;">
              <circle cx="12" cy="6" r="2"/>
              <circle cx="12" cy="12" r="2"/>
              <circle cx="12" cy="18" r="2"/>
            </svg>
          </button>
        </div>
        <h3 class="text-base font-semibold mb-1.5" style="color: #1a1a1a;">AI 工具官网首屏与介绍页</h3>
        <p class="text-xs mb-3 leading-relaxed" style="color: #888;">4 人响应，2 人已进入沟通。建议今日确认合作对象。</p>
        <div class="w-full h-0.5 rounded-full mb-3" style="background: #eee;">
          <div class="h-0.5 rounded-full" style="width: 60%; background: #1a1a1a;"></div>
        </div>
        <div class="flex items-center gap-2">
          <button class="px-4 py-1.5 rounded-full text-xs" style="background: #f5f5f5; color: #666;">编辑</button>
          <button class="px-4 py-1.5 rounded-full text-xs" style="background: #f5f5f5; color: #666;">下架</button>
          <button class="px-4 py-1.5 rounded-full text-xs" style="background: #f5f5f5; color: #666;">标记解决</button>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="bg-white rounded-2xl p-4" style="box-shadow: 0 2px 12px rgba(0,0,0,0.04);">
        <div class="flex items-center gap-2 mb-2">
          <span class="px-2.5 py-0.5 rounded-full text-xs" style="background: #f5f5f5; color: #888; border: 1px solid rgba(0,0,0,0.06);">供给</span>
          <span class="px-2.5 py-0.5 rounded-full text-xs font-medium text-white" style="background: #1a1a1a;">展示中</span>
        </div>
        <h3 class="text-base font-semibold mb-1.5" style="color: #1a1a1a;">可提供 AI 应用前端开发</h3>
        <p class="text-xs mb-3" style="color: #888;">完整度 86%，建议补充 1 个过往案例提高响应率。</p>
        <div class="w-full h-0.5 rounded-full" style="background: #eee;">
          <div class="h-0.5 rounded-full" style="width: 86%; background: #1a1a1a;"></div>
        </div>
      </div>

      <!-- Card 3 -->
      <div class="bg-white rounded-2xl p-4" style="box-shadow: 0 2px 12px rgba(0,0,0,0.04);">
        <div class="flex items-center gap-2 mb-2">
          <span class="px-2.5 py-0.5 rounded-full text-xs" style="background: #f5f5f5; color: #888; border: 1px solid rgba(0,0,0,0.06);">已过期</span>
        </div>
        <h3 class="text-base font-semibold mb-1.5" style="color: #1a1a1a;">找内容搭子共创短视频栏目</h3>
        <p class="text-xs mb-3" style="color: #888;">可一键重新发布，系统会保留原字段。</p>
        <div class="w-full h-0.5 rounded-full" style="background: #eee;">
          <div class="h-0.5 rounded-full" style="width: 100%; background: #ccc;"></div>
        </div>
      </div>
    </div>

    <!-- 底部 Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
        </div>
        <div class="tab-label">发现</div>
      </div>
      <div class="tab-item active">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <div class="tab-label">任务</div>
      </div>
      <div class="tab-item center">
        <div class="publish-btn"></div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="tab-label">信息</div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="tab-label">我的</div>
      </div>
    </div>

    <!-- Home Indicator -->
    <div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-28 h-1 rounded-full" style="background: rgba(0,0,0,0.15);"></div>
  </div>

</body>
</html>
