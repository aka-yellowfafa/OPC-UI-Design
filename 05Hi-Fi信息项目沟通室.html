<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>信息 / 项目室</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background: #1a202c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .phone-frame {
      width: 402px;
      height: 874px;
      background: #F5EFE2;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      border-radius: 48px;
      border: 10px solid #f0ece6;
      box-shadow: 0 25px 80px rgba(0,0,0,0.35);
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .chat-container {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0 16px;
    }

    /* 气泡样式 */
    .bubble-left {
      background: #fff;
      color: #1a1a1a;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 260px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .bubble-right {
      background: #1a1a1a;
      color: #fff;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 260px;
    }
    .bubble-time {
      font-size: 11px;
      color: #bbb;
      margin-top: 4px;
    }

    /* 系统卡片 */
    .system-card {
      background: #fff;
      border-radius: 16px;
      padding: 14px;
      margin: 0 auto;
      max-width: 320px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    }
    .system-summary {
      background: #fff;
      border-radius: 16px;
      padding: 14px;
      margin: 0 auto;
      max-width: 320px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    }

    /* 文件气泡 */
    .file-bubble {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 240px;
      cursor: pointer;
    }

    /* 底部输入区 */
    .input-bar {
      background: #fff;
      border-radius: 28px;
      padding: 8px 8px 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 16px 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    /* Tab Bar */
    .tab-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: #F5EFE2;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 6px;
      border-top: 1px solid rgba(0,0,0,0.04);
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding-top: 6px;
      cursor: pointer;
      flex: 1;
      min-width: 50px;
    }
    .tab-item.center {
      position: relative;
      top: -18px;
      flex: 1;
    }
    .tab-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tab-icon svg {
      width: 22px;
      height: 22px;
      stroke: #bbb;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .tab-item.active .tab-icon svg {
      stroke: #1a1a1a;
      fill: #1a1a1a;
    }
    .tab-label {
      font-size: 10px;
      color: #bbb;
    }
    .tab-item.active .tab-label {
      color: #1a1a1a;
      font-weight: 500;
    }
    .publish-btn {
      width: 50px;
      height: 50px;
      background: #1a1a1a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 4px solid #F5EFE2;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      position: relative;
    }
    .publish-btn::before,
    .publish-btn::after {
      content: '';
      position: absolute;
      background: #fff;
      border-radius: 1px;
    }
    .publish-btn::before {
      width: 18px;
      height: 2.5px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .publish-btn::after {
      width: 2.5px;
      height: 18px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>

  <div class="phone-frame">
    <!-- Status Bar -->
    <div class="flex items-center justify-between px-7 pt-4 pb-2 flex-shrink-0">
      <span class="text-sm font-semibold" style="color: #1a1a1a;">9:41</span>
      <div class="flex items-center gap-1">
        <div class="w-6 h-3 border rounded-sm relative" style="border-color: #1a1a1a;">
          <div class="absolute inset-0.5 rounded-sm" style="background: #1a1a1a;"></div>
        </div>
      </div>
    </div>

    <!-- Header -->
    <div class="flex items-center justify-between px-4 pt-2 pb-3 flex-shrink-0">
      <button class="w-10 h-10 rounded-full bg-white flex items-center justify-center" style="box-shadow: 0 2px 12px rgba(0,0,0,0.06);">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="color: #1a1a1a;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="text-center">
        <p class="text-sm font-semibold" style="color: #1a1a1a;">信息 / 项目室</p>
        <p class="text-xs" style="color: #999;">信息 · 项目沟通中 · 2 人</p>
      </div>
      <button class="w-10 h-10 rounded-full bg-white flex items-center justify-center" style="box-shadow: 0 2px 12px rgba(0,0,0,0.06);">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" style="color: #1a1a1a;">
          <circle cx="12" cy="6" r="2"/>
          <circle cx="12" cy="12" r="2"/>
          <circle cx="12" cy="18" r="2"/>
        </svg>
      </button>
    </div>

    <!-- Search Bar -->
    <div class="px-4 mb-4 flex-shrink-0">
      <div class="flex items-center gap-2 bg-white rounded-full px-4 py-2.5" style="box-shadow: 0 1px 6px rgba(0,0,0,0.04);">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color: #bbb;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="text" placeholder="搜索历史消息、文件" class="bg-transparent text-sm outline-none w-full" style="color: #1a1a1a;">
      </div>
    </div>

    <!-- Chat Content -->
    <div class="chat-container hide-scrollbar" style="padding-bottom: 140px;">
      <!-- System Card: 下一步 -->
      <div class="system-card mb-4">
        <div class="flex items-center justify-between mb-2">
          <span class="text-xs" style="color: #888;">下一步</span>
          <span class="px-2.5 py-0.5 rounded-full text-xs font-medium" style="background: #D4875A; color: #fff;">待确认</span>
        </div>
        <p class="text-sm" style="color: #1a1a1a;">今天 18:00 前确认参考案例和交付范围。</p>
      </div>

      <!-- 对方消息 -->
      <div class="flex items-start gap-2 mb-4">
        <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0" style="background: #1a1a1a; margin-top: 4px;">
          <span class="text-white text-xs font-medium">林</span>
        </div>
        <div>
          <div class="bubble-left">
            <p>案例可以发我看看吗？预算可以按两页初版先走。</p>
          </div>
          <p class="bubble-time">09:46</p>
        </div>
      </div>

      <!-- 自己消息 1 -->
      <div class="flex justify-end mb-2">
        <div>
          <div class="bubble-right">
            <p>可以。我先发 2 个近期案例，今晚能给你一个简单排期。</p>
          </div>
          <p class="bubble-time text-right">09:48</p>
        </div>
      </div>

      <!-- 自己消息 2: 文件 -->
      <div class="flex justify-end mb-4">
        <div class="file-bubble">
          <div class="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0" style="background: rgba(255,255,255,0.15);">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </div>
          <div>
            <p class="text-sm text-white">SaaS 案例包.pdf</p>
            <p class="text-xs" style="color: rgba(255,255,255,0.6);">2.4 MB</p>
          </div>
        </div>
      </div>

      <!-- System Summary -->
      <div class="system-summary">
        <p class="text-xs mb-2" style="color: #bbb;">系统摘要</p>
        <p class="text-sm leading-relaxed" style="color: #666;">双方已确认：两页设计初版、远程协作、预算 3k-5k。待补充案例与时间表。</p>
      </div>
    </div>

    <!-- Input Bar -->
    <div class="absolute bottom-20 left-0 right-0">
      <div class="input-bar">
        <button class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0" style="background: #f5f5f5;">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="color: #666;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
        </button>
        <input type="text" placeholder="输入消息或按住说话" class="bg-transparent text-sm outline-none flex-1" style="color: #1a1a1a;">
        <button class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" style="background: #1a1a1a;">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 底部 Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
        </div>
        <div class="tab-label">发现</div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </div>
        <div class="tab-label">任务</div>
      </div>
      <div class="tab-item center">
        <div class="publish-btn"></div>
      </div>
      <div class="tab-item active">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="tab-label">信息</div>
      </div>
      <div class="tab-item">
        <div class="tab-icon">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="tab-label">我的</div>
      </div>
    </div>

    <!-- Home Indicator -->
    <div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-28 h-1 rounded-full" style="background: rgba(0,0,0,0.15);"></div>
  </div>

</body>
</html>
